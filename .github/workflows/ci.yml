name: CI

on:
  pull_request:
  push:
    branches: [ main ]
  workflow_call:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # No lint step: eslint is not a project dependency (the `lint` script
      # assumes a global install). Add it here if/when eslint lands in
      # devDependencies with a config.

      - name: Build
        run: pnpm run build

      - name: Unit tests
        run: pnpm run test:unit

      # Integration tests (venue.test.ts) need a live venue and are run
      # locally for now — see AGENTS.md.
